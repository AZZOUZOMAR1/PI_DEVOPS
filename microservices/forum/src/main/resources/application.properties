spring.application.name=forum

spring.datasource.url=jdbc:mysql://localhost:3306/forumdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=000000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8040

# Les appels Feign passent par la gateway (8100), déjà point d'entrée du frontend.
# Cela évite les 503 quand un service n'est pas exposé directement sur son port interne local.
user.api.base-url=http://localhost:8100
inscription.api.base-url=http://localhost:8100

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=35MB

# Dossier local pour images/vidéos forum (créé au besoin lors du 1er upload)
forum.upload-dir=forum-uploads

# --- AI (Gemini) ---
# Prefer FORUM_AI_API_KEY (env) in production. Optional local file (gitignored), see application-local.properties.example.
forum.ai.api-key=${FORUM_AI_API_KEY:}
forum.ai.model=gemini-2.0-flash
forum.ai.max-input-chars=12000

# --- Tutor Assist (n8n / VAPI bridge) ---
# Base URL should point to n8n webhook root (example: http://localhost:5678/webhook)
forum.tutor-assist.base-url=${FORUM_TUTOR_ASSIST_BASE_URL:}
forum.tutor-assist.api-key=${FORUM_TUTOR_ASSIST_API_KEY:}
forum.tutor-assist.slots-path=calendar_slots
forum.tutor-assist.availability-path=calendar_availability
forum.tutor-assist.set-appointment-path=calendar_set_appointment
forum.tutor-assist.callback-key=${FORUM_TUTOR_CALLBACK_KEY:}

spring.config.import=optional:classpath:application-local.properties
