spring.application.name=evaluation
server.port=8020

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/evaluatiob?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=000000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Public base URL used to build /uploads/... links returned by upload endpoints.
# Must point to the API Gateway so Angular can access files through the same origin.
app.public.base-url=http://localhost:8100/api/
# Uploads folder (UploadPathConfig will resolve to "<repo>/frontend/uploads" automatically)
app.upload.dir=uploads

ai.ollama.url=http://localhost:11434/v1/chat/completions
ai.ollama.model=llama3.2