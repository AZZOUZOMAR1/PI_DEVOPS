spring.application.name=reclamation

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/reclamationdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password= 000000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8012

# Reclamation chatbot (OpenAI-compatible API)
# Use environment variable OPENAI_API_KEY to enable real AI responses
chatbot.openai.api-key=${OPENAI_API_KEY:}
chatbot.openai.base-url=https://api.openai.com/v1/chat/completions
chatbot.openai.model=gpt-4o-mini

# Moderation bad words list (comma-separated)
app.moderation.bad-words=insulte,idiot,stupid,fuck,shit

# Auto-resolve when this many or more different students have open reclamations with the same subject (normalized). Set to 0 to disable.
app.reclamation.auto-resolve.min-distinct-students=3

# Classification ML (Python: uvicorn dans ml-classifier, port 8025). Vide = désactivé.
reclamation.ml.base-url=http://127.0.0.1:8025
app.reclamation.auto-resolve.message=This request was automatically closed after three or more different students reported the same subject.
