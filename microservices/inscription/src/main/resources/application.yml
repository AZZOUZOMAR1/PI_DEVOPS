server:
  port: 8050

spring:
  application:
    name: inscription

  datasource:
    url: jdbc:mysql://localhost:3306/inscription_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Si MySQL a encore une FK orders.user_id -> users.id créée avant suppression du @ManyToOne,
      # supprimez-la : SHOW CREATE TABLE orders; puis ALTER TABLE orders DROP FOREIGN KEY <nom>;
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:your-email@gmail.com}
    password: ${EMAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    esprit.inscription: DEBUG
    org.springframework.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Custom Mailing Properties
mailing:
  templates:
    base-path: classpath:templates/emails/
  tracking:
    base-url: http://localhost:8050
    pixel-path: /api/inscription/email-tracking/pixel
    link-prefix: /api/inscription/email-tracking/link
  rate-limit:
    emails-per-minute: 60
    emails-per-hour: 1000
