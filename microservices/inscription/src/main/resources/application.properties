spring.application.name=inscription

spring.datasource.url=jdbc:mysql://localhost:3306/inscriptiondb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=000000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8050

# Allow larger request bodies (e.g., base64 images in JSON)
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=-1

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.debug=true

# Stripe (do NOT commit real keys)
#Backend secret key must be sk_test_... or sk_live_...
stripe.secret-key=${STRIPE_SECRET_KEY:}
# Stripe webhook signing secret (Stripe Dashboard → Webhooks → Add endpoint → Signing secret)
# Récupérez whsec_... après avoir créé un endpoint pour checkout.session.completed
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Stripe publishable key (safe for frontend) must be pk_test_... or pk_live_...
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}

# Default currency for Stripe charges (must be supported by your Stripe account)
# Examples: eur, usd, gbp...
stripe.currency=eur

# Optional local overrides (gitignored). Copy keys here for dev — do not commit this file.
spring.config.import=optional:classpath:application-local.properties

# Increase allowed upload size for placement certificates (default was 1MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.main.allow-bean-definition-overriding=true