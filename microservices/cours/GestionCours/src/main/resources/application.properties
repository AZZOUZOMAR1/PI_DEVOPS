spring.application.name=GestionCours
server.port=9090
server.servlet.context-path=/pidev4sae10
### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/GestionCours-4SAE10?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

# (Optionnel) Tolérer des payloads plus grands (si besoin)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-swallow-size=-1

spring.config.import=optional:classpath:application-secret.properties
openai.api.url=https://api.groq.com/openai/v1/chat/completions
groq.whisper.url=https://api.groq.com/openai/v1/audio/transcriptions
# Remplacement Groq de llama3-8b-8192 (décommissionné) : llama-3.1-8b-instant
openai.model=llama-3.1-8b-instant
# Clé : OPENAI_API_KEY (env) ou application-secret.properties — ne pas la coller ici.
openai.api.key=${OPENAI_API_KEY:}
# Si true : en cas d'échec du LLM (clé, quota, réseau, JSON invalide), renvoie une analyse mock au lieu d'un 502
openai.fallback.mock-on-error=true

# Dossier fichiers audio générés (par chapitre)
chapter.presentation.storage-dir=./data/chapter-presentations