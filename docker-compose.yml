services:
  mysql:
    image: mysql:8.0
    container_name: mysql-service
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clubdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - pidev-network

  eureka:
    image: steeltoeoss/eureka-server:latest
    container_name: eureka-service
    ports:
      - "8761:8761"
    restart: unless-stopped
    networks:
      - pidev-network

  club:
    image: omarazzouz/club:latest
    container_name: club-service
    ports:
      - "8085:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_ADDRESS: "0.0.0.0"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clubdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    restart: unless-stopped
    networks:
      - pidev-network

  evenement:
    image: omarazzouz/evenement:latest
    container_name: evenement-service
    ports:
      - "8086:8081"
    environment:
      SERVER_PORT: "8081"
      SERVER_ADDRESS: "0.0.0.0"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clubdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    restart: unless-stopped
    networks:
      - pidev-network

networks:
  pidev-network:
    external: true

volumes:
  mysql-data:
