global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'club-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['club-service:8080']

  - job_name: 'evenement-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['evenement-service:8081']
