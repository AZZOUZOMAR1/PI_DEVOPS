spring.application.name=gateway
server.port=8100
# Taille max du body pour les requêtes proxy (ex. signup avec photo)
spring.codec.max-in-memory-size=20MB
#EUREKA_Registery
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# CORS is configured in CorsConfig.java only (avoid duplicate headers with user service)

# Routes defined in GatewayApplication.java (user-auth, user-users -> lb://user)

# Base URLs for additional microservices (can be overridden by env vars)
cours.base-url=http://localhost:9090
gestionclasses.base-url=http://localhost:9092
forum.base-url=http://localhost:8040
inscription.base-url=http://localhost:8050

#Log routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# Global CORS for frontend -> gateway calls
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Avoid duplicate CORS headers when downstream services also send them
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Actuator (debug routes)
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
